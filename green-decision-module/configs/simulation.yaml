# When-to-run simulation - Green Window Observatory (V1.0)
#
# Scaffold only in Milestones 0-2; the replay engine is Milestone 6.

zone: FR
random_state: 42

workloads:
  arrivals: poisson            # poisson | replayed_schedule
  rate_per_day: 24
  classes:
    - name: generic_deferrable
      deferrable: true
      duration_hours: {distribution: lognormal, mean_hours: 2.0, sigma: 0.5}
      energy_proxy_kw: 5.0
      max_delay_hours: 12
    - name: generic_non_deferrable
      deferrable: false
      duration_hours: {distribution: lognormal, mean_hours: 2.0, sigma: 0.5}
      energy_proxy_kw: 5.0
      max_delay_hours: 0

policies: [baseline, carbon_only, facility_only, combined_green_window, oracle]

metrics: [delay_minutes, carbon_score_at_start, oracle_regret,
          pct_oracle_potential_captured, estimated_co2_proxy_g]

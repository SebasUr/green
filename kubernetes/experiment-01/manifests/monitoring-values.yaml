grafana:
  nodeSelector:
    sustainability.cern.ch/role: observability

  # --- Grafana sidecar fix (CERN Magnum cluster) -----------------------------
  # The k8s-sidecar image ships a strict OpenSSL that rejects the Magnum API
  # server CA (it lacks the X.509 Authority Key Identifier extension), so both
  # sidecars CrashLoop with:
  #   SSLCertVerificationError: certificate verify failed: Missing Authority Key Identifier
  # That leaves the Grafana pod 1/3 Ready and out of the Service endpoints.
  # skipTlsVerify makes the sidecars talk to the in-cluster API over TLS without
  # chain verification (the connection stays in-cluster to 10.254.0.1:443).
  sidecar:
    dashboards:
      enabled: true
      skipTlsVerify: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      searchNamespace: ALL
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      skipTlsVerify: true

prometheusOperator:
  nodeSelector:
    sustainability.cern.ch/role: observability

prometheus:
  prometheusSpec:
    nodeSelector:
      sustainability.cern.ch/role: observability
    retention: 30d
    retentionSize: 40GB
    scrapeInterval: 15s
    evaluationInterval: 15s

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      sustainability.cern.ch/role: observability

kube-state-metrics:
  nodeSelector:
    sustainability.cern.ch/role: observability

  # Expose the experiment dimensions as Prometheus labels. Since kube-state-metrics
  # v2, kube_*_labels metrics are empty unless the labels are explicitly allow-listed,
  # so without this you cannot filter/group Grafana by policy/trial/workload.
  # Label names are sanitized by KSM: sustainability.cern.ch/policy
  #   -> kube_job_labels{label_sustainability_cern_ch_policy="..."}
  metricLabelsAllowlist:
    - jobs=[sustainability.cern.ch/track,sustainability.cern.ch/workload,sustainability.cern.ch/policy,sustainability.cern.ch/experiment,sustainability.cern.ch/trial]
    - pods=[sustainability.cern.ch/track,sustainability.cern.ch/workload,sustainability.cern.ch/policy,sustainability.cern.ch/experiment,sustainability.cern.ch/trial]

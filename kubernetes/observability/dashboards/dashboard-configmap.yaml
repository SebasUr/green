  job-drilldown.json: |
    {
      "uid": "green-obs-job-drill",
      "title": "Green Observatory \u2014 Job drilldown",
      "tags": [
        "green-observatory",
        "kepler",
        "carbon",
        "jobs",
        "cern"
      ],
      "timezone": "utc",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "refresh": "10s",
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "type": "dashboard",
            "name": "Annotations & Alerts",
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)"
          }
        ]
      },
      "links": [
        {
          "type": "dashboards",
          "title": "Back to Jobs",
          "tags": [
            "jobs"
          ],
          "asDropdown": false,
          "icon": "external link",
          "includeVars": false,
          "keepTime": false,
          "targetBlank": false
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Data source",
            "current": {},
            "hide": 0,
            "refresh": 1,
            "regex": ""
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Namespace",
            "query": "label_values(kube_job_info, namespace)",
            "current": {
              "text": "green-experiment",
              "value": "green-experiment"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": false,
            "multi": false
          },
          {
            "name": "job",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Job",
            "query": "label_values(kube_job_info{namespace=~\"$namespace\"}, job_name)",
            "current": {},
            "refresh": 2,
            "sort": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Job $job \u2014 energy & CO\u2082 (exploration)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Energy (range)",
          "description": "Kepler pod CPU energy accumulated over the selected range. Authoritative value: greenctl jobs report.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(max without(state)(increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\",zone=\"package\"}[$__range])))/3600000",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "kwatth",
              "decimals": 6,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Average power (range)",
          "description": "Range energy / range duration. Meaningful when the range is the Job window.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(max without(state)(increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\",zone=\"package\"}[$__range])))/3600000 * 3600000 / ($__range_s)",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 2,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Cumulative CO\u2082 (range)",
          "description": "gCO2eq accumulated over the range, per-interval weighted via the pod_co2_emission recording rule (Riemann, 15s).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum_over_time(sum(pod_co2_emission_gco2_per_second{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\"})[$__range:15s])*15",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 4,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"

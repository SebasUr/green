            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max_over_time((sum(max without(state)(kepler_pod_cpu_watts{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\",zone=\"package\"})))[$__range:15s])",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "decimals": 2,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto",
            "justifyMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Pod CPU power",
          "description": "Kepler-attributed CPU power for this Job's pod(s).",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(max without(state)(kepler_pod_cpu_watts{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\",zone=\"package\"}))",
              "legendFormat": "$job",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                },
                "axisPlacement": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Pod CO\u2082 emission rate",
          "description": "gCO2eq/h = pod watts \u00d7 live RTE intensity. Needs the recording rules + rte-carbon-exporter.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(pod_co2_emission_gco2_per_second{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\"}) * 3600",
              "legendFormat": "$job",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "spanNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                },
                "axisPlacement": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Cumulative energy (Kepler counter)",
          "description": "The raw cumulative Kepler counter in kWh \u2014 should rise monotonically while the pod runs and flatten when it ends.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(max without(state)(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\",pod_name=~\"$job-.*\",zone=\"package\"}))/3600000",
              "legendFormat": "$job",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "kwatth",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 25,
                "gradientMode": "opacity",
                "spanNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                },
                "axisPlacement": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Grid carbon intensity during the run",
          "description": "What the grid was doing while this Job ran.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "targets": [
            {
              "refId": "A",
              "expr": "max(rte_carbon_intensity_gco2eq_per_kwh)",
              "legendFormat": "RTE FR gCO2eq/kWh",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 20,
                "gradientMode": "opacity",
                "spanNulls": false,
                "showPoints": "never",
                "pointSize": 5,
                "stacking": {
                  "mode": "none",
                  "group": "A"
                },
                "axisPlacement": "auto"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max",
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 10,
          "type": "text",
          "title": "Provenance",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 21
          },
          "options": {
            "mode": "markdown",
            "content": "These panels are **recomputed from Prometheus** (Kepler + RTE exporter) and are meant for exploring the shape of a run.\n\nThe **authoritative** energy and carbon for this Job \u2014 pod-precise boundaries, reset-aware counter deltas, per-interval RTE weighting and quality gates \u2014 comes from:\n\n```bash\ngreenctl jobs report $job -n $namespace --output runs/job-reports\n```\nIf a number here disagrees with the JSON report, the report wins."
          }
        }
      ]
    }
  jobs-overview.json: |
    {
      "uid": "green-obs-jobs",
      "title": "Green Observatory \u2014 Jobs",
      "tags": [
        "green-observatory",
        "kepler",
        "carbon",
        "jobs",
        "cern"
      ],
      "timezone": "utc",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 0,
      "refresh": "30s",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "type": "dashboard",
            "name": "Annotations & Alerts",
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)"
          }
        ]
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "label": "Data source",
            "current": {},
            "hide": 0,
            "refresh": 1,
            "regex": ""
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Namespace",
            "query": "label_values(kube_job_info, namespace)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true
          },
          {
            "name": "policy",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Policy",
            "query": "label_values(kube_job_labels, label_sustainability_cern_ch_policy)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true
          },
          {
            "name": "trial",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${datasource}"
            },
            "label": "Trial",
            "query": "label_values(kube_job_labels, label_sustainability_cern_ch_trial)",
            "current": {
              "text": "All",
              "value": "$__all"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Jobs that ran (click a row to drill into its energy)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "table",
          "title": "Jobs",
          "description": "From kube-state-metrics. Click the job name to open the drilldown scoped to that Job. Times are the Job-controller window; greenctl uses pod-precise boundaries, so the duration here can differ by a few seconds.",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "format": "table",
              "instant": true,
              "expr": "(kube_job_status_start_time{namespace=~\"$namespace\"} * 1000) * on(namespace, job_name) group_left(label_sustainability_cern_ch_policy,label_sustainability_cern_ch_trial,label_sustainability_cern_ch_workload,label_sustainability_cern_ch_experiment) kube_job_labels{namespace=~\"$namespace\",label_sustainability_cern_ch_policy=~\"$policy\",label_sustainability_cern_ch_trial=~\"$trial\"}"
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "format": "table",
              "instant": true,
              "expr": "(kube_job_status_completion_time{namespace=~\"$namespace\"} * 1000) * on(namespace, job_name) group_left() kube_job_labels{namespace=~\"$namespace\",label_sustainability_cern_ch_policy=~\"$policy\",label_sustainability_cern_ch_trial=~\"$trial\"}"
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "format": "table",
              "instant": true,
              "expr": "kube_job_status_succeeded{namespace=~\"$namespace\"} * on(namespace, job_name) group_left() kube_job_labels{namespace=~\"$namespace\",label_sustainability_cern_ch_policy=~\"$policy\",label_sustainability_cern_ch_trial=~\"$trial\"}"
            },
            {
              "refId": "D",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "format": "table",
              "instant": true,
              "expr": "kube_job_status_failed{namespace=~\"$namespace\"} * on(namespace, job_name) group_left() kube_job_labels{namespace=~\"$namespace\",label_sustainability_cern_ch_policy=~\"$policy\",label_sustainability_cern_ch_trial=~\"$trial\"}"
            }
          ],
          "transformations": [
            {
              "id": "joinByField",
              "options": {
                "byField": "job_name",
                "mode": "outer"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Duration",
                "mode": "binary",
                "binary": {
                  "left": "Value #B",
                  "operator": "-",
                  "right": "Value #A"
                },
                "replaceFields": false
              }
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "job_name": "Job",
                  "namespace": "Namespace",
                  "label_sustainability_cern_ch_policy": "Policy",
                  "label_sustainability_cern_ch_trial": "Trial",
                  "label_sustainability_cern_ch_workload": "Workload",
                  "label_sustainability_cern_ch_experiment": "Experiment",
                  "Value #A": "Start",
                  "Value #B": "End",
                  "Value #C": "Succeeded",
                  "Value #D": "Failed"
                },
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true,
                  "Time 4": true,
                  "namespace 2": true,
                  "namespace 3": true,
                  "namespace 4": true,
                  "__name__": true,
                  "job": true,
                  "instance": true,
                  "container": true,
                  "endpoint": true,
                  "service": true,
                  "pod": true,
                  "uid": true,
                  "label_sustainability_cern_ch_experiment": true
                },
                "indexByName": {}
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Job"
                },
                "properties": [
                  {
                    "id": "links",
                    "value": [
                      {
                        "title": "Energy & CO\u2082 drilldown for this Job",
                        "url": "/d/green-obs-job-drill/job-drilldown?var-datasource=${datasource}&var-namespace=${__data.fields[\"Namespace\"]}&var-job=${__data.fields[\"Job\"]}&from=${__data.fields[\"Start\"]}&to=${__data.fields[\"End\"]}",
                        "targetBlank": false
                      }
                    ]
                  },
                  {
                    "id": "custom.width",
                    "value": 260
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Start"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "dateTimeAsIso"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "End"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "dateTimeAsIso"
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Duration"
                },
                "properties": [
                  {
                    "id": "unit",
                    "value": "ms"
                  },
                  {
                    "id": "decimals",
                    "value": 0
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Succeeded"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 100
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Failed"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 90
                  },
                  {
                    "id": "custom.cellOptions",
                    "value": {
                      "type": "color-background",
                      "mode": "basic"
                    }
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "red",
                          "value": 1
                        }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Start",
                "desc": true
              }
            ]
          }
        },
        {
          "id": 3,
          "type": "text",
          "title": "How to read this",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 13
          },
          "options": {
            "mode": "markdown",
            "content": "**Exploration view.** The table lists Kubernetes Jobs currently known to kube-state-metrics (live objects; deleted Jobs disappear from the list even though their Kepler series stay in Prometheus for the retention window).\n\nClick a **Job** name to open the drilldown with the time range preset to that Job's window.\n\n> For authoritative energy & carbon numbers use `greenctl jobs report <job> -n <ns>` \u2014 it uses pod-precise boundaries, reset-aware counters and per-interval RTE weighting. These dashboards recompute from Prometheus and are approximate."
          }
        }
      ]
    }
